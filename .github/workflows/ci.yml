name: CI
on: [push, pull_request]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Set up sbt
        uses: sbt/setup-sbt@v1
      - name: Cache sbt
        uses: coursier/cache-action@v6
      - run: sbt scalafmtCheckAll scalafmtSbtCheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Set up sbt
        uses: sbt/setup-sbt@v1
      - name: Cache sbt
        uses: coursier/cache-action@v6
      - run: |
          git apply src/test/diff/solutions.diff
          sbt test

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Set up sbt
        uses: sbt/setup-sbt@v1
      - name: Cache sbt
        uses: coursier/cache-action@v6
      - run: sbt verifyKoans
